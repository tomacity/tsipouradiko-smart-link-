<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Το Τσιπουράδικο της Μυρσίνης</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500;1,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #FBF3E7;
    --ink: #2B2118;
    --tan: #B89968;
    --tan-deep: #a4835a;
    --wine: #7A2331;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100dvh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:48px 24px env(safe-area-inset-bottom);
    -webkit-tap-highlight-color:transparent;
  }
  .card{
    width:100%;
    max-width:380px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }
  .divider-top{
    width:70px;
    height:1px;
    background:var(--tan);
    margin-bottom:42px;
  }
  .frame{
    width:190px;
    margin-bottom:24px;
  }
  .frame img{
    width:100%;
    height:auto;
    display:block;
  }
  .title-img{
    width:280px;
    max-width:85%;
    height:auto;
    margin:0 0 30px;
    display:block;
  }
  .divider-mid{
    width:70px;
    height:1px;
    background:var(--tan);
    margin-bottom:26px;
  }
  .actions{
    width:100%;
    display:flex;
    flex-direction:column;
    gap:14px;
    margin-bottom:26px;
  }
  a.btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:100%;
    min-height:54px;
    border-radius:6px;
    font-family:'Inter',sans-serif;
    font-size:15px;
    font-weight:600;
    text-decoration:none;
    transition:transform 0.15s ease;
  }
  a.btn:active{transform:scale(0.97);}
  .btn-primary{
    background:var(--tan);
    color:#fff8ec;
  }
  .btn-secondary{
    background:transparent;
    color:var(--tan-deep);
    border:1.5px solid var(--tan);
  }
  footer.status{
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--ink);
    opacity:0.6;
    margin-bottom:70px;
  }
  .powered{
    display:flex;
    align-items:center;
    gap:8px;
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    color:#8a7a63;
  }
  .powered .word-img{height:20px;width:auto;}
</style>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="card">
    <div class="divider-top"></div>

    <div class="frame">
      <img src="mirsini-photo.png" alt="Η Μυρσίνη">
    </div>

    <img class="title-img" src="tsipouradiko-title.png" alt="το Τσιπουράδικο της Μυρσίνης">

    <div class="divider-mid"></div>

    <div class="actions">
      <a href="#menu" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff8ec" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V5a2 2 0 0 1 2-2h8.5L20 7.5V19a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2Z"/><path d="M14 3v4a2 2 0 0 0 2 2h4"/><path d="M8 13h8M8 17h5"/></svg>
        Δείτε το μενού
      </a>
      <a href="#review" class="btn btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#B89968" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.5l2.9 6.3 6.9.7-5.2 4.7 1.5 6.8-6.1-3.6-6.1 3.6 1.5-6.8-5.2-4.7 6.9-.7z"/></svg>
        Αφήστε αξιολόγηση
      </a>
    </div>

    <footer class="status">TAP CONFIRMED · Καλή σας όρεξη</footer>

    <div class="powered">
      powered by :
      <img class="word-img" src="zisto-wordmark.png" alt="Zisto">
    </div>
  </div>
</body>
</html>
